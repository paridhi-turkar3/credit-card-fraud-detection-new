<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI Credit Card Fraud Detection</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{

      background:
      linear-gradient(rgba(2,6,23,0.92), rgba(2,6,23,0.96)),
      url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070');

      background-size:cover;
      background-position:center;

      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:20px;
    }

    .container{

      width:100%;
      max-width:1200px;

      display:grid;
      grid-template-columns:1fr 1fr;

      gap:30px;
    }

    .left-panel{

      color:white;

      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .left-panel h1{

      font-size:58px;
      line-height:1.1;
      margin-bottom:20px;
    }

    .left-panel span{
      color:#38bdf8;
    }

    .left-panel p{

      color:#cbd5e1;
      line-height:1.8;
      font-size:18px;
    }

    .stats{

      display:flex;
      gap:20px;
      margin-top:40px;
    }

    .stat-box{

      flex:1;

      background:rgba(255,255,255,0.06);

      border:1px solid rgba(255,255,255,0.1);

      backdrop-filter:blur(10px);

      border-radius:20px;

      padding:20px;
    }

    .stat-box h2{

      color:#38bdf8;
      font-size:30px;
    }

    .stat-box p{

      margin-top:10px;
      color:#e2e8f0;
    }

    .card{

      background:rgba(15,23,42,0.85);

      border:1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(12px);

      border-radius:25px;

      padding:30px;

      box-shadow:0 0 40px rgba(0,0,0,0.4);
    }

    .card h2{

      color:white;

      text-align:center;

      margin-bottom:25px;

      font-size:32px;
    }

    .input-group{

      margin-bottom:18px;
    }

    label{

      display:block;

      margin-bottom:8px;

      color:#cbd5e1;

      font-size:14px;
    }

    input,select{

      width:100%;

      padding:14px;

      border:none;

      border-radius:12px;

      background:#e2e8f0;

      font-size:15px;

      outline:none;
    }

    input:focus,
    select:focus{

      box-shadow:0 0 12px #38bdf8;
    }

    .btn-group{

      display:flex;
      gap:12px;
      margin-top:20px;
    }

    button{

      flex:1;

      padding:15px;

      border:none;

      border-radius:14px;

      cursor:pointer;

      font-size:16px;

      font-weight:600;

      transition:0.3s;
    }

    .primary-btn{

      background:linear-gradient(135deg,#0ea5e9,#38bdf8);

      color:white;
    }

    .demo-btn{

      background:#1e293b;
      color:white;
      border:1px solid rgba(255,255,255,0.1);
    }

    button:hover{

      transform:translateY(-2px);
    }

    #result{

      margin-top:25px;

      padding:18px;

      border-radius:16px;

      text-align:center;

      font-size:22px;

      font-weight:600;
    }

    .safe{

      background:rgba(34,197,94,0.15);

      color:#22c55e;

      border:1px solid #22c55e;
    }

    .fraud{

      background:rgba(239,68,68,0.15);

      color:#ef4444;

      border:1px solid #ef4444;
    }

    .risk-container{

      margin-top:25px;
    }

    .risk-label{

      color:white;

      margin-bottom:10px;
    }

    .risk-meter{

      width:100%;

      height:18px;

      background:#1e293b;

      border-radius:20px;

      overflow:hidden;
    }

    #risk-bar{

      height:100%;
      width:0%;
      transition:0.5s;
    }

    @media(max-width:950px){

      .container{
        grid-template-columns:1fr;
      }

      .left-panel{
        text-align:center;
      }

      .left-panel h1{
        font-size:42px;
      }

      .stats{
        flex-direction:column;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <div class="left-panel">

    <h1>
      AI Powered <span>Fraud</span><br>
      Detection System
    </h1>

    <p>
      Advanced machine learning powered security system
      designed to detect suspicious credit card transactions
      in real-time using behavioral analytics and AI.
    </p>

    <div class="stats">

      <div class="stat-box">
        <h2>99.9%</h2>
        <p>Detection Accuracy</p>
      </div>

      <div class="stat-box">
        <h2>24/7</h2>
        <p>AI Monitoring</p>
      </div>

      <div class="stat-box">
        <h2>31</h2>
        <p>Features Analyzed</p>
      </div>

    </div>

  </div>

  <div class="card">

    <h2>Transaction Analysis</h2>

    <div class="input-group">
      <label>Transaction Amount</label>
      <input type="number" id="amount" placeholder="Enter amount">
    </div>

    <div class="input-group">
      <label>Transaction Hour</label>
      <input type="number" id="hour" placeholder="0 - 23">
    </div>

    <div class="input-group">
      <label>Merchant Type</label>

      <select id="merchant">
        <option>Shopping</option>
        <option>Travel</option>
        <option>Food</option>
        <option>Electronics</option>
      </select>
    </div>

    <div class="input-group">
      <label>Device Type</label>

      <select id="device">
        <option>Mobile</option>
        <option>Laptop</option>
        <option>ATM</option>
      </select>
    </div>

    <div class="input-group">
      <label>Transaction Frequency</label>

      <select id="frequency">
        <option>Normal</option>
        <option>Unusual</option>
      </select>
    </div>

    <div class="btn-group">

      <button class="demo-btn" onclick="loadSafeDemo()">
        Safe Demo
      </button>

      <button class="demo-btn" onclick="loadFraudDemo()">
        Fraud Demo
      </button>

    </div>

    <div class="btn-group">

      <button class="primary-btn" onclick="predictFraud()">
        Analyze Transaction
      </button>

    </div>

    <div id="result"></div>

    <div class="risk-container">

      <div class="risk-label">
        Risk Level
      </div>

      <div class="risk-meter">
        <div id="risk-bar"></div>
      </div>

    </div>

  </div>

</div>

<script>

function generateFeatures(){

    const amount =
      parseFloat(document.getElementById("amount").value);

    const hour =
      parseFloat(document.getElementById("hour").value);

    const merchant =
      document.getElementById("merchant").value;

    const device =
      document.getElementById("device").value;

    const frequency =
      document.getElementById("frequency").value;

    let features = new Array(31).fill(0);

    features[0] = hour * 100;

    features[29] = amount;

    features[30] = hour;

    if(amount > 5000){

        features[1] = -10;
        features[2] = 8;
        features[3] = -12;
    }

    if(frequency === "Unusual"){

        features[4] = 10;
        features[5] = -8;
    }

    if(device === "ATM"){

        features[6] = -5;
    }

    return features;
}

async function predictFraud(){

    const features = generateFeatures();

    const response = await fetch("/predict",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            features:features
        })

    });

    const data = await response.json();

    const resultDiv =
      document.getElementById("result");

    const riskBar =
      document.getElementById("risk-bar");

    resultDiv.innerHTML =
      data.prediction || data.error;

    if(data.prediction.includes("Fraud")){

        resultDiv.className = "fraud";

        riskBar.style.width = "90%";

        riskBar.style.background =
          "#ef4444";

    }else{

        resultDiv.className = "safe";

        riskBar.style.width = "20%";

        riskBar.style.background =
          "#22c55e";
    }
}

function loadSafeDemo(){

    document.getElementById("amount").value = 120;

    document.getElementById("hour").value = 14;

    document.getElementById("merchant").value =
      "Shopping";

    document.getElementById("device").value =
      "Mobile";

    document.getElementById("frequency").value =
      "Normal";
}

function loadFraudDemo(){

    document.getElementById("amount").value = 15000;

    document.getElementById("hour").value = 3;

    document.getElementById("merchant").value =
      "Electronics";

    document.getElementById("device").value =
      "ATM";

    document.getElementById("frequency").value =
      "Unusual";
}

</script>

</body>
</html>
